[workspace]
# path of the git-cliff configuration
changelog_config = "cliff.toml"
# update dependencies with `cargo update`
dependencies_update = true
# labels for the release PR
pr_labels = ["release"]

# The two workspace crates (`unum-core`, `unum`) release in lockstep at the same
# version, so emit a single shared `v{{ version }}` git tag + GitHub release
# rather than release-plz's per-crate `{{ package }}-v{{ version }}` default (the
# default for workspaces with more than one public package). Only `unum` (the
# last crate published, in dependency order) owns the shared tag/release; see the
# per-package sections below.
git_tag_name = "v{{ version }}"
git_release_name = "v{{ version }}"
git_release_enable = true

# run cargo-semver-checks on release PRs; v0.1.0 is published on crates.io and
# serves as the comparison baseline.
semver_check = true

# `unum` owns the single shared `v{{ version }}` tag + GitHub release configured
# at the [workspace] level; disable unum-core's own tag/release so the two crates
# don't collide trying to create the same ref during `release-plz release`.
[[package]]
name = "unum-core"
git_tag_enable = false
git_release_enable = false

[[package]]
name = "unum"
git_tag_enable = true
git_release_enable = true
